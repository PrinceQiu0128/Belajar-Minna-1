<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Minna no Nihongo</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f4f6fb; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 2.5rem; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 350px; text-align: center; }
        h2 { color: #0d1220; margin-bottom: 0.5rem; }
        p { color: #7580a0; font-size: 0.9rem; margin-bottom: 1.5rem; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #e2e7f2; border-radius: 8px; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: #4f62e8; }
        button { width: 100%; padding: 12px; background: #4f62e8; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        button:hover { background: #3a4260; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Selamat Datang</h2>
        <p>Silakan login untuk akses materi</p>
        <input type="email" id="email" placeholder="Email Pembeli">
        <input type="password" id="password" placeholder="Password">
        <button id="btnLogin">Masuk Sekarang</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Config asli dari akun kamu
        const firebaseConfig = {
            apiKey: "AIzaSyDinwdzN-Y-P0BlCqPvj6y1Inc6dhvssKU",
            authDomain: "jualan-web-50d9e.firebaseapp.com",
            projectId: "jualan-web-50d9e",
            storageBucket: "jualan-web-50d9e.firebasestorage.app",
            messagingSenderId: "1021060785335",
            appId: "1:1021060785335:web:45622074c33c9ccceb9932"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById('btnLogin').onclick = () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            signInWithEmailAndPassword(auth, email, pass)
                .then(() => { window.location.href = "index.html"; })
                .catch((err) => { alert("Gagal: Email atau Password salah!"); });
        };
    </script>
</body>
</html>
