<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minna no Nihongo — Kosa Kata Bab 1–25</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500;700&family=Shippori+Mincho:wght@400;500;700&family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1614;
    --ink-soft: #3d3530;
    --ink-muted: #7a6f68;
    --ink-faint: #b5aca5;
    --paper: #faf7f2;
    --paper-warm: #f2ede4;
    --paper-dark: #e8e0d4;
    --red: #c0392b;
    --red-soft: #e8c4bf;
    --gold: #9a7a3a;
    --gold-light: #f0e6c8;
    --blue-ink: #2c4a6e;
    --blue-soft: #c5d4e8;
    --seal: #c0392b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Cormorant Garamond', 'Noto Serif JP', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 28px, rgba(160,140,120,0.06) 28px, rgba(160,140,120,0.06) 29px),
      repeating-linear-gradient(90deg, transparent, transparent 28px, rgba(160,140,120,0.04) 28px, rgba(160,140,120,0.04) 29px);
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    padding: 3.5rem 2rem 2.5rem;
    text-align: center;
    border-bottom: 1px solid var(--paper-dark);
    background: linear-gradient(180deg, var(--paper-warm) 0%, var(--paper) 100%);
    overflow: hidden;
  }

  header::before {
    content: '日本語';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 12rem;
    font-family: 'Noto Serif JP', serif;
    font-weight: 700;
    color: rgba(160,140,120,0.06);
    white-space: nowrap;
    pointer-events: none;
    user-select: none;
    line-height: 1;
  }

  .lesson-badge {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-muted);
    border: 1px solid var(--paper-dark);
    padding: 5px 14px;
    border-radius: 2px;
    margin-bottom: 1.2rem;
    position: relative;
  }

  header h1 {
    font-size: clamp(2.2rem, 6vw, 4rem);
    font-weight: 600;
    line-height: 1.1;
    letter-spacing: -0.02em;
    color: var(--ink);
    position: relative;
  }

  header h1 span.jp {
    font-family: 'Noto Serif JP', serif;
    font-weight: 700;
    font-size: 0.7em;
    color: var(--red);
    display: block;
    margin-top: 0.3rem;
  }

  .header-sub {
    margin-top: 1rem;
    font-size: 0.95rem;
    color: var(--ink-muted);
    font-style: italic;
    letter-spacing: 0.03em;
    position: relative;
  }

  .seal {
    width: 56px;
    height: 56px;
    background: var(--seal);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 1.5rem auto 0;
    font-family: 'Noto Serif JP', serif;
    font-weight: 700;
    font-size: 1.1rem;
    color: #fff;
    letter-spacing: 0.05em;
    position: relative;
    box-shadow: 0 0 0 4px var(--red-soft), 0 2px 12px rgba(192,57,43,0.2);
  }

  .bab-nav {
    background: var(--paper-warm);
    border-bottom: 1px solid var(--paper-dark);
    padding: 0.75rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    z-index: 101;
  }

  .bab-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-muted);
    white-space: nowrap;
  }

  .bab-btns {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
  }

  .bab-btn {
    width: 34px;
    height: 28px;
    border: 1px solid var(--paper-dark);
    background: transparent;
    border-radius: 2px;
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: var(--ink-muted);
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .bab-btn:hover:not(.empty) {
    border-color: var(--gold);
    color: var(--gold);
    background: var(--gold-light);
  }

  .bab-btn.active {
    background: var(--ink) !important;
    color: var(--paper) !important;
    border-color: var(--ink) !important;
  }

  .bab-btn.empty {
    opacity: 0.3;
    cursor: default;
  }

  .bab-btn.has-data {
    border-color: var(--ink-faint);
    color: var(--ink-soft);
  }

  .controls {
    position: sticky;
    top: 46px;
    z-index: 100;
    background: rgba(250,247,242,0.95);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--paper-dark);
    padding: 1rem 1.5rem;
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
    align-items: center;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 180px;
  }

  .search-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    width: 15px;
    height: 15px;
    color: var(--ink-muted);
  }

  #search {
    width: 100%;
    padding: 9px 12px 9px 36px;
    background: var(--paper-warm);
    border: 1px solid var(--paper-dark);
    border-radius: 3px;
    font-family: 'DM Mono', monospace;
    font-size: 0.82rem;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  #search::placeholder { color: var(--ink-faint); }
  #search:focus { border-color: var(--gold); box-shadow: 0 0 0 3px var(--gold-light); }

  .filter-btns { display: flex; gap: 6px; flex-wrap: wrap; }

  .filter-btn {
    padding: 7px 14px;
    border: 1px solid var(--paper-dark);
    background: transparent;
    border-radius: 2px;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-muted);
    cursor: pointer;
    transition: all 0.18s;
    white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--gold); color: var(--gold); background: var(--gold-light); }
  .filter-btn.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

  .count-badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--ink-muted);
    white-space: nowrap;
    padding: 0 4px;
  }

  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
    position: relative;
    z-index: 1;
  }

  .section {
    margin-bottom: 2.5rem;
    animation: fadeUp 0.5s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 0.75rem;
    padding-bottom: 0.6rem;
    border-bottom: 2px solid var(--ink);
  }

  .section-num {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--paper);
    background: var(--ink-soft);
    padding: 3px 8px;
    border-radius: 2px;
    letter-spacing: 0.1em;
  }

  .section-title {
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: 0.04em;
  }

  .section-jp {
    font-family: 'Noto Serif JP', serif;
    font-size: 0.95rem;
    color: var(--ink-muted);
    font-weight: 300;
    margin-left: auto;
  }

  .vocab-table {
    width: 100%;
    border-collapse: collapse;
  }

  .vocab-table thead th {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-faint);
    padding: 6px 12px;
    text-align: left;
    border-bottom: 1px solid var(--paper-dark);
    background: var(--paper-warm);
  }

  .vocab-row {
    transition: background 0.15s;
    border-bottom: 1px solid var(--paper-dark);
    cursor: default;
  }
  .vocab-row:last-child { border-bottom: none; }
  .vocab-row:hover { background: var(--paper-warm); }
  .vocab-row:hover .row-num { color: var(--red); }

  .vocab-row td { padding: 10px 12px; vertical-align: middle; }

  .td-num {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--ink-faint);
    width: 28px;
    text-align: right;
    padding-right: 8px !important;
    transition: color 0.15s;
  }

  .td-jp { width: 160px; }

  .jp-main {
    font-family: 'Noto Serif JP', serif;
    font-size: 1.1rem;
    font-weight: 500;
    color: var(--ink);
    line-height: 1.3;
  }

  .jp-romaji {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: var(--blue-ink);
    margin-top: 2px;
    font-style: italic;
  }

  .jp-note {
    font-family: 'Noto Serif JP', serif;
    font-size: 0.65rem;
    color: var(--ink-muted);
    margin-top: 2px;
  }

  .td-kanji {
    width: 90px;
    font-family: 'Noto Serif JP', serif;
    font-size: 1.25rem;
    font-weight: 400;
    color: var(--red);
    letter-spacing: 0.05em;
  }

  .td-meaning {
    font-size: 0.92rem;
    color: var(--ink-soft);
    line-height: 1.5;
  }

  .empty { text-align: center; padding: 3rem 1rem; color: var(--ink-muted); font-size: 1rem; font-style: italic; display: none; }
  .empty .big { font-family: 'Noto Serif JP', serif; font-size: 2.5rem; display: block; margin-bottom: 0.5rem; opacity: 0.3; }

  .coming-soon {
    text-align: center;
    padding: 4rem 2rem;
    display: none;
  }
  .coming-soon .cs-kanji {
    font-family: 'Noto Serif JP', serif;
    font-size: 4rem;
    color: rgba(160,140,120,0.2);
    display: block;
    margin-bottom: 1rem;
    line-height: 1;
  }
  .coming-soon h2 {
    font-size: 1.3rem;
    font-weight: 600;
    color: var(--ink-soft);
    margin-bottom: 0.5rem;
  }
  .coming-soon p {
    font-size: 0.9rem;
    color: var(--ink-muted);
    font-style: italic;
  }

  mark { background: var(--gold-light); color: inherit; border-radius: 2px; padding: 0 2px; }

  footer {
    text-align: center;
    padding: 2rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    color: var(--ink-faint);
    border-top: 1px solid var(--paper-dark);
    position: relative;
    z-index: 1;
  }

  @media (max-width: 600px) {
    header { padding: 2.5rem 1rem 2rem; }
    .bab-nav { padding: 0.6rem 1rem; top: 0; }
    .controls { padding: 0.75rem 1rem; top: 44px; }
    main { padding: 1.5rem 1rem 3rem; }
    .td-num { display: none; }
    .td-jp { width: 130px; }
    .td-kanji { width: 70px; font-size: 1.05rem; }
    .jp-main { font-size: 0.95rem; }
    .section-jp { display: none; }
    header::before { font-size: 6rem; }
    .bab-btn { width: 30px; height: 26px; font-size: 0.62rem; }
  }

  .section:nth-child(1) { animation-delay: 0.05s; }
  .section:nth-child(2) { animation-delay: 0.10s; }
  .section:nth-child(3) { animation-delay: 0.15s; }
  .section:nth-child(4) { animation-delay: 0.20s; }
  .section:nth-child(5) { animation-delay: 0.25s; }
  .section:nth-child(6) { animation-delay: 0.30s; }
</style>
</head>
<body>

<header>
  <div class="lesson-badge">Minna no Nihongo · Buku I</div>
  <h1 id="headerTitle">
    Pelajaran 1
    <span class="jp" id="headerJp">第一課 · 語彙</span>
  </h1>
  <p class="header-sub">Kosa Kata Lengkap dengan Romaji</p>
  <div class="seal" id="sealEl">一</div>
</header>

<div class="bab-nav">
  <span class="bab-label">Pelajaran:</span>
  <div class="bab-btns" id="babBtns"></div>
</div>

<div class="controls">
  <div class="search-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="search" placeholder="Cari kata Jepang, romaji, atau arti...">
  </div>
  <div class="filter-btns" id="filterBtns">
    <button class="filter-btn active" data-filter="all">Semua</button>
    <button class="filter-btn" data-filter="verb">Kata Kerja</button>
    <button class="filter-btn" data-filter="adj">Kata Sifat</button>
    <button class="filter-btn" data-filter="body">Anggota Tubuh</button>
    <button class="filter-btn" data-filter="noun">Kata Benda</button>
    <button class="filter-btn" data-filter="expr">Ekspresi</button>
    <button class="filter-btn" data-filter="place">Tempat</button>
  </div>
  <span class="count-badge" id="count"></span>
</div>

<main id="main"></main>
<div class="empty" id="empty">
  <span class="big">見つからない</span>
  Kata tidak ditemukan. Coba kata lain.
</div>
<div class="coming-soon" id="comingSoon">
  <span class="cs-kanji">準備中</span>
  <h2>Pelajaran ini belum tersedia</h2>
  <p>Data kosa kata sedang disiapkan. Silakan pilih pelajaran lain.</p>
</div>

<footer id="footerEl">第一課 &nbsp;·&nbsp; Pelajaran 1 &nbsp;·&nbsp; Kosa Kata Bahasa Jepang</footer>

    }
  ],

};

// ════════════════════════════════════════════════════════
//  JUDUL BAB
// ════════════════════════════════════════════════════════

  2:  { title:"Pelajaran 2",  jp:"第二課 · 語彙",     seal:"二",   kanji:"第二課" },

  5:  { title:"Pelajaran 5",  jp:"第五課 · 語彙",     seal:"五",   kanji:"第五課" },
  6:  { title:"Pelajaran 6",  jp:"第六課 · 語彙",     seal:"六",   kanji:"第六課" },

  8:  { title:"Pelajaran 8",  jp:"第八課 · 語彙",     seal:"八",   kanji:"第八課" },

  10: { title:"Pelajaran 10", jp:"第十課 · 語彙",     seal:"十",   kanji:"第十課" },

  16: { title:"Pelajaran 16", jp:"第十六課 · 語彙",   seal:"十六", kanji:"第十六課" },

// ════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════
let currentBab   = 1;
let activeFilter = "all";
let searchQ      = "";

// ════════════════════════════════════════════════════════
//  BUAT TOMBOL BAB 1–25
// ════════════════════════════════════════════════════════
const babContainer = document.getElementById('babBtns');
for (let i = 1; i <= 25; i++) {
  const btn = document.createElement('button');
  const hasData = !!allBabs[i];
  btn.className = 'bab-btn' + (i === 1 ? ' active' : '') + (hasData ? ' has-data' : ' empty');
  btn.textContent = i;
  btn.title = hasData ? 'Pelajaran ' + i : 'Pelajaran ' + i + ' (belum tersedia)';
  if (hasData) {
    btn.addEventListener('click', () => {
      if (currentBab === i) return;
      currentBab = i;
      document.querySelectorAll('.bab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = 'all';
      searchQ = '';
      document.getElementById('search').value = '';
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      document.querySelector('[data-filter="all"]').classList.add('active');
      const t = babTitles[i];
      const h1 = document.getElementById('headerTitle');
      h1.childNodes[0].textContent = t.title + ' ';
      document.getElementById('headerJp').textContent = t.jp;
      document.getElementById('sealEl').textContent = t.seal;
      document.getElementById('footerEl').textContent = t.kanji + ' · ' + t.title + ' · Kosa Kata Bahasa Jepang';
      document.getElementById('main').scrollIntoView({ behavior: 'smooth', block: 'start' });
      render();
    });
  }
  babContainer.appendChild(btn);
}

// ════════════════════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════════════════════
function hl(text) {
  if (!searchQ) return text;
  const re = new RegExp(`(${searchQ.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return text.replace(re, '<mark>$1</mark>');
}

function matchRow(r) {
  const q = searchQ.toLowerCase();
  if (!q) return true;
  return r.jp.includes(q) || r.rom.toLowerCase().includes(q) || r.meaning.toLowerCase().includes(q) || r.kanji.toLowerCase().includes(q) || (r.note && r.note.includes(q));
}

function render() {
  const mainEl      = document.getElementById('main');
  const emptyEl     = document.getElementById('empty');
  const comingSoon  = document.getElementById('comingSoon');
  const sections    = allBabs[currentBab];

  if (!sections) {
    mainEl.innerHTML  = '';
    mainEl.style.display   = 'none';
    emptyEl.style.display  = 'none';
    comingSoon.style.display = 'block';
    document.getElementById('count').textContent = '— kata';
    return;
  }

  comingSoon.style.display = 'none';
  let total = 0;

  mainEl.innerHTML = sections.map(sec => {
    const rows = sec.rows.filter(r => {
      const typeOk = activeFilter === 'all' || r.type === activeFilter || sec.id === activeFilter;
      return typeOk && matchRow(r);
    });
    if (!rows.length) return '';
    total += rows.length;

    const rowsHtml = rows.map((r, i) => `
      <tr class="vocab-row">
        <td class="td-num row-num">${String(i+1).padStart(2,'0')}</td>
        <td class="td-jp">
          <div class="jp-main">${hl(r.jp)}</div>
          <div class="jp-romaji">${hl(r.rom)}</div>
          ${r.note ? `<div class="jp-note">${hl(r.note)}</div>` : ''}
        </td>
        <td class="td-kanji">${r.kanji !== '—' ? hl(r.kanji) : '<span style="color:var(--ink-faint)">—</span>'}</td>
        <td class="td-meaning">${hl(r.meaning)}</td>
      </tr>
    `).join('');

    return `
      <div class="section">
        <div class="section-header">
          <span class="section-num">${sec.num}</span>
          <span class="section-title">${sec.title}</span>
          <span class="section-jp">${sec.jp}</span>
        </div>
        <table class="vocab-table">
          <thead>
            <tr>
              <th style="width:28px"></th>
              <th>Hiragana / Katakana</th>
              <th>Kanji</th>
              <th>Arti (Bahasa Indonesia)</th>
            </tr>
          </thead>
          <tbody>${rowsHtml}</tbody>
        </table>
      </div>
    `;
  }).join('');

  document.getElementById('count').textContent = total + ' kata';
  emptyEl.style.display  = total === 0 ? 'block' : 'none';
  mainEl.style.display   = total === 0 ? 'none'  : '';
}

// ════════════════════════════════════════════════════════
//  EVENT LISTENERS
// ════════════════════════════════════════════════════════
document.getElementById('search').addEventListener('input', e => {
  searchQ = e.target.value.trim();
  render();
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    render();
  });
});

render();
</script>
